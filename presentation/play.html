rink-0\"></span>Our approach: Add AWGN at various SNR levels to adversarial examples</li>\n                            </ul>\n                            <div class=\"flex justify-center py-2 bg-gray-50 rounded border border-gray-100\">\n                                <img src=\"assets/bc2308e58eb6.png\" alt=\"Channel Model Formula\" class=\"w-[428px] h-[38px] object-contain\">\n                            </div>\n                        </div>\n\n                        <!-- Key Discovery Box -->\n                        <div id=\"discovery-box\" class=\"w-[480px] p-4 bg-orange-50 border-l-4 border-orange-500 rounded-r-sm\" style=\"translate: none; rotate: none; scale: none; opacity: 1; transform: translate(0px, 0px);\">\n                            <h2 class=\"font-sans text-lg font-bold text-orange-700 mb-2\">Key Discovery:</h2>\n                            <ul class=\"space-y-2 font-sans text-[15px] text-gray-700\">\n                                <li class=\"flex items-start gap-2\">\n                                    <span class=\"font-bold text-orange-600\">●</span>\n                                    <span><strong>Low SNR (-5 dB):</strong> ASR increases from 23% to 57% (2.5× amplification)</span>\n                                </li>\n                                <li class=\"flex items-start gap-2\">\n                                    <span class=\"font-bold text-orange-600\">●</span>\n                                    <span><strong>High SNR (15-30 dB):</strong> ASR converges to digital-domain baseline (~22%)</span>\n                                </li>\n                                <li class=\"flex items-start gap-2\">\n                                    <span class=\"font-bold text-orange-600\">●</span>\n                                    <span>Channel noise interacts with adversarial perturbations constructively</span>\n                                </li>\n                            </ul>\n                        </div>\n
